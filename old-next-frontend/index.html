<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&family=Noto+Sans+Arabic:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dashboard</title>
    <script>
      try {
        const lng = localStorage.getItem("i18nextLng") || "en"
        const base = lng.split(/[-_]/)[0] || "en"
        const rtl = ["ar", "he", "fa", "ur"].includes(base)
        document.documentElement.lang = lng
        document.documentElement.dir = rtl ? "rtl" : "ltr"

        const storedTheme = localStorage.getItem("dashboard-theme")
        let dark = false
        if (storedTheme === "dark") dark = true
        else if (storedTheme === "light") dark = false
        else
          dark = window.matchMedia("(prefers-color-scheme: dark)").matches
        document.documentElement.classList.toggle("dark", dark)
      } catch {
        /* no-op */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
